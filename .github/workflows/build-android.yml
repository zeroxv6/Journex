name: Build Android APK

on:
  push:
    tags:
      - 'android-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "Error: GOOGLE_SERVICES_JSON secret is not set"
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          echo "google-services.json created successfully"
          cat app/google-services.json | head -5
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Clean build
        run: ./gradlew clean
      
      - name: Build Android APK
        run: |
          ./gradlew clean
          ./gradlew :app:assembleRelease --stacktrace
      
      - name: Verify and rename APK
        run: |
          echo "Searching for APK files..."
          find app/build/outputs/apk/release -type f -name "*.apk"
          
          # Find the APK (could be app-release.apk or app-release-unsigned.apk)
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            echo "Found signed APK"
            ls -lh app/build/outputs/apk/release/app-release.apk
          elif [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            echo "Found unsigned APK, renaming to app-release.apk"
            mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/app-release.apk
            ls -lh app/build/outputs/apk/release/app-release.apk
          else
            echo "ERROR: No APK found!"
            echo "Contents of release directory:"
            ls -la app/build/outputs/apk/release/
            exit 1
          fi
          
          # Verify APK is valid
          if [ ! -s app/build/outputs/apk/release/app-release.apk ]; then
            echo "ERROR: APK file is empty!"
            exit 1
          fi
          
          echo "APK size: $(du -h app/build/outputs/apk/release/app-release.apk | cut -f1)"
      
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
