name: Build Multi-Platform Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build Android APK
        run: |
          ./gradlew clean
          ./gradlew :app:assembleRelease --stacktrace
      
      - name: Verify and rename APK
        run: |
          if [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/app-release.apk
          fi
          ls -lh app/build/outputs/apk/release/app-release.apk
          echo "APK size: $(du -h app/build/outputs/apk/release/app-release.apk | cut -f1)"
      
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7

  build-linux-appimage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - name: Decode credentials.json
        env:
          CREDENTIALS_JSON: ${{ secrets.CREDENTIALS_JSON }}
        run: |
          mkdir -p desktop/src/jvmMain/resources
          echo "$CREDENTIALS_JSON" > desktop/src/jvmMain/resources/credentials.json
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build Desktop JAR
        run: ./gradlew :desktop:packageReleaseDistributionForCurrentOS --parallel --build-cache
      
      - name: Download and setup AppImage tools
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage --appimage-extract > /dev/null 2>&1
          sudo mv squashfs-root /opt/appimagetool
          sudo ln -s /opt/appimagetool/AppRun /usr/local/bin/appimagetool
      
      - name: Create AppImage
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          
          # Copy the entire Journex directory contents
          if [ -d "desktop/build/compose/binaries/main-release/app/Journex" ]; then
            cp -r desktop/build/compose/binaries/main-release/app/Journex/* AppDir/usr/bin/
          else
            cp -r desktop/build/compose/binaries/main-release/app/* AppDir/usr/bin/
          fi
          
          # Find the actual executable
          EXEC_NAME=$(find AppDir/usr/bin -maxdepth 2 -type f -name "Journex" -o -name "journex" | head -1)
          if [ -z "$EXEC_NAME" ]; then
            echo "Looking for bin/Journex..."
            EXEC_NAME="Journex/bin/Journex"
          fi
          
          cat > AppDir/journex.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Journex
          Comment=Journaling Application
          Exec=AppRun
          Icon=journex
          Categories=Office;Utility;
          Terminal=false
          EOF
          
          cp AppDir/journex.desktop AppDir/usr/share/applications/
          cp desktop/src/jvmMain/resources/journex_icon.png AppDir/journex.png 2>/dev/null || touch AppDir/journex.png
          cp AppDir/journex.png AppDir/usr/share/icons/hicolor/256x256/apps/journex.png
          
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"
          
          # Find and execute the Journex binary
          if [ -f "${HERE}/usr/bin/Journex/bin/Journex" ]; then
            cd "${HERE}/usr/bin/Journex/bin"
            exec ./Journex "$@"
          elif [ -f "${HERE}/usr/bin/bin/Journex" ]; then
            cd "${HERE}/usr/bin/bin"
            exec ./Journex "$@"
          else
            echo "Error: Journex executable not found"
            exit 1
          fi
          EOF
          
          chmod +x AppDir/AppRun
          ARCH=x86_64 appimagetool --no-appstream AppDir Journex-x86_64.AppImage
      
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: Journex-x86_64.AppImage
          retention-days: 7

  build-windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - name: Decode credentials.json
        env:
          CREDENTIALS_JSON: ${{ secrets.CREDENTIALS_JSON }}
        run: |
          New-Item -ItemType Directory -Force -Path desktop/src/jvmMain/resources
          echo "$env:CREDENTIALS_JSON" | Out-File -FilePath desktop/src/jvmMain/resources/credentials.json -Encoding UTF8
      
      - name: Build Windows EXE
        run: ./gradlew :desktop:packageReleaseExe --parallel --build-cache
      
      - name: Rename EXE to remove version
        run: |
          $exeFile = Get-ChildItem -Path desktop/build/compose/binaries/main-release -Filter "*.exe" -Recurse | Select-Object -First 1
          if ($exeFile) {
            $newPath = Join-Path $exeFile.DirectoryName "Journex.exe"
            Move-Item -Path $exeFile.FullName -Destination $newPath -Force
            Write-Host "Renamed to: Journex.exe"
          }
      
      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: desktop/build/compose/binaries/main-release/**/Journex.exe
          retention-days: 7

  create-release:
    needs: [build-android, build-linux-appimage, build-windows-exe]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Display structure of downloaded files
        run: ls -R artifacts/
      
      - name: Create installation instructions
        run: |
          cat > INSTALLATION.txt << 'EOF'
          JOURNEX - Installation Instructions
          ====================================
          
          ANDROID (APK)
          -------------
          1. Enable "Install from unknown sources" in Android settings
          2. Transfer the APK to your phone
          3. Tap to install
          
          LINUX (AppImage)
          ----------------
          1. Make executable: chmod +x Journex-x86_64.AppImage
          2. Run: ./Journex-x86_64.AppImage
          3. If FUSE error: sudo apt install fuse (or pacman -S fuse2)
          
          WINDOWS (EXE)
          -------------
          1. Double-click Journex.exe
          2. If Windows SmartScreen appears:
             - Click "More info"
             - Click "Run anyway"
          3. This is normal for unsigned apps (code signing costs $300/year)
          
          The app is safe - it's open source and you can verify the code on GitHub.
          
          For detailed instructions, see: https://github.com/YOUR_USERNAME/journex
          EOF
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.apk
            artifacts/**/*.AppImage
            artifacts/**/*.exe
            INSTALLATION.txt
          body: |
            ## Installation Instructions
            
            ### Windows Users
            When you run the .exe file, Windows SmartScreen will show a warning. This is normal for unsigned applications.
            
            **To install:**
            1. Click "More info"
            2. Click "Run anyway"
            
            This happens because code signing certificates cost $300/year. The app is safe and open source.
            
            ### Linux Users
            Make the AppImage executable:
            ```bash
            chmod +x Journex-x86_64.AppImage
            ./Journex-x86_64.AppImage
            ```
            
            ### Android Users
            Enable "Install from unknown sources" in your Android settings, then install the APK.
            
            ---
            
            See INSTALLATION.txt in the release assets for detailed instructions.
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
