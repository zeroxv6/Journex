name: Build Multi-Platform Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build Android APK
        run: ./gradlew :app:assembleRelease --parallel --build-cache --configuration-cache
      
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7

  build-linux-appimage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build Desktop JAR
        run: ./gradlew :desktop:packageReleaseDistributionForCurrentOS --parallel --build-cache
      
      - name: Download and setup AppImage tools
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage --appimage-extract > /dev/null 2>&1
          sudo mv squashfs-root /opt/appimagetool
          sudo ln -s /opt/appimagetool/AppRun /usr/local/bin/appimagetool
      
      - name: Create AppImage
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          
          # Copy the entire Journex directory contents
          if [ -d "desktop/build/compose/binaries/main-release/app/Journex" ]; then
            cp -r desktop/build/compose/binaries/main-release/app/Journex/* AppDir/usr/bin/
          else
            cp -r desktop/build/compose/binaries/main-release/app/* AppDir/usr/bin/
          fi
          
          # Find the actual executable
          EXEC_NAME=$(find AppDir/usr/bin -maxdepth 2 -type f -name "Journex" -o -name "journex" | head -1)
          if [ -z "$EXEC_NAME" ]; then
            echo "Looking for bin/Journex..."
            EXEC_NAME="Journex/bin/Journex"
          fi
          
          cat > AppDir/journex.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Journex
          Comment=Journaling Application
          Exec=AppRun
          Icon=journex
          Categories=Office;Utility;
          Terminal=false
          EOF
          
          cp AppDir/journex.desktop AppDir/usr/share/applications/
          cp desktop/src/jvmMain/resources/journex_icon.png AppDir/journex.png 2>/dev/null || touch AppDir/journex.png
          cp AppDir/journex.png AppDir/usr/share/icons/hicolor/256x256/apps/journex.png
          
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"
          
          # Find and execute the Journex binary
          if [ -f "${HERE}/usr/bin/Journex/bin/Journex" ]; then
            cd "${HERE}/usr/bin/Journex/bin"
            exec ./Journex "$@"
          elif [ -f "${HERE}/usr/bin/bin/Journex" ]; then
            cd "${HERE}/usr/bin/bin"
            exec ./Journex "$@"
          else
            echo "Error: Journex executable not found"
            exit 1
          fi
          EOF
          
          chmod +x AppDir/AppRun
          ARCH=x86_64 appimagetool --no-appstream AppDir Journex-x86_64.AppImage
      
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: Journex-x86_64.AppImage
          retention-days: 7

  build-windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - name: Build Windows EXE
        run: ./gradlew :desktop:packageReleaseExe --parallel --build-cache
      
      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: desktop/build/compose/binaries/main-release/**/*.exe
          retention-days: 7

  create-release:
    needs: [build-android, build-linux-appimage, build-windows-exe]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Display structure of downloaded files
        run: ls -R artifacts/
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.apk
            artifacts/**/*.AppImage
            artifacts/**/*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
